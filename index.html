<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Apple HD Neon Player</title>
    <style>
        body {
            background-color: #020205; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased; 
            color: #d4ffff;
            font-family: sans-serif;
            user-select: none; 
            transition: all 0.3s ease;
        }

        #ascii-screen {
            font-family: 'Courier New', Courier, monospace;
            font-size: 5px;       
            line-height: 5px;     
            letter-spacing: 0px;  
            white-space: pre; 
            margin-bottom: 20px;
            text-shadow: 0 0 2px #fff, 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff;
            transition: all 0.3s ease;
            transform-origin: center;
            transform: scale(1.0); 
        }

        #controls-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: rgba(0, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 10px #00ffff;
            transition: all 0.3s ease;
        }

        button {
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            background-color: #00ffff;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            box-shadow: 0 0 10px #00ffff;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: white;
            box-shadow: 0 0 20px #ffffff;
        }

        .ascii-slider {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            cursor: pointer;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        #time-display {
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #00ffff;
            width: 90px;
            text-align: center;
            transition: all 0.3s ease;
        }

        #loading {
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            margin-bottom: 10px;
        }

        #donate-btn {
            position: fixed; 
            top: 20px;       
            right: 20px;     
            padding: 10px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none; 
            color: #ff00ff; 
            border: 1px solid #ff00ff;
            border-radius: 5px;
            box-shadow: 0 0 10px #ff00ff; 
            background-color: rgba(255, 0, 255, 0.1);
            transition: all 0.3s ease;
            z-index: 1000; 
        }

        #donate-btn:hover {
            background-color: #ff00ff;
            color: white;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
        }

        /* 🌟 클래식 모드 🌟 */
        body.classic-mode { background-color: black; color: white; }
        body.classic-mode #ascii-screen { color: #ddd; text-shadow: none; }
        body.classic-mode #controls-container { background-color: transparent; border: 1px solid white; box-shadow: none; }
        body.classic-mode button { background-color: white; color: black; box-shadow: none; }
        body.classic-mode .ascii-slider, body.classic-mode #time-display, body.classic-mode #loading { color: white; text-shadow: none; }
        body.classic-mode #donate-btn { color: white; border-color: white; background-color: transparent; box-shadow: none; }
        body.classic-mode #donate-btn:hover { background-color: white; color: black; }

        /* 🌟 새로 추가된 레인보우 모드 애니메이션 🌟 */
        @keyframes rainbowGlow {
            0%   { color: #ff0000; text-shadow: 0 0 5px #ff0000, 0 0 15px #ff0000; }
            15%  { color: #ff7f00; text-shadow: 0 0 5px #ff7f00, 0 0 15px #ff7f00; }
            30%  { color: #ffff00; text-shadow: 0 0 5px #ffff00, 0 0 15px #ffff00; }
            45%  { color: #00ff00; text-shadow: 0 0 5px #00ff00, 0 0 15px #00ff00; }
            60%  { color: #0000ff; text-shadow: 0 0 5px #0000ff, 0 0 15px #0000ff; }
            75%  { color: #4b0082; text-shadow: 0 0 5px #4b0082, 0 0 15px #4b0082; }
            90%  { color: #9400d3; text-shadow: 0 0 5px #9400d3, 0 0 15px #9400d3; }
            100% { color: #ff0000; text-shadow: 0 0 5px #ff0000, 0 0 15px #ff0000; }
        }

        /* rainbow-mode 클래스가 붙으면 모든 요소에 무지개 애니메이션을 강제로 덮어씌웁니다 */
        body.rainbow-mode #ascii-screen,
        body.rainbow-mode #time-display,
        body.rainbow-mode .ascii-slider,
        body.rainbow-mode #loading,
        body.rainbow-mode #donate-btn,
        body.rainbow-mode button {
            animation: rainbowGlow 2s linear infinite !important; /* 2초마다 한 바퀴 돕니다 */
        }

        body.rainbow-mode #controls-container,
        body.rainbow-mode button,
        body.rainbow-mode #donate-btn {
            background-color: transparent !important; /* 배경색을 투명하게 해서 글자 빛을 살립니다 */
        }
    </style>
</head>
<body>

    <a href="https://paypal.me/hyunjunseo129" target="_blank" id="donate-btn">☕ Donate (PayPal)</a>

    <div id="loading">HD 데이터를 불러오는 중입니다...</div>
    <div id="ascii-screen"></div>

    <div id="controls-container">
        <button id="play-btn" disabled>▶ PLAY</button>
        <span id="ascii-progress" class="ascii-slider">[------------------------------]</span>
        <span id="time-display">0:00 / 0:00</span>
        <span>VOL</span>
        <span id="ascii-volume" class="ascii-slider">[██████████]</span>
        <button id="neon-btn">NEON: ON</button>
    </div>

    <script>
        const screen = document.getElementById('ascii-screen');
        const playBtn = document.getElementById('play-btn');
        const neonBtn = document.getElementById('neon-btn');
        const loadingText = document.getElementById('loading');
        const asciiProgress = document.getElementById('ascii-progress');
        const asciiVolume = document.getElementById('ascii-volume');
        const timeDisplay = document.getElementById('time-display');
        
        const audio = new Audio('bad_apple.mp3'); 
        
        let frames = [];
        let isPlaying = false;
        let isNeon = true;
        let intervalId;
        
        const fps = 15; 

        const progressLen = 30; 
        const volumeLen = 10;   

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function generateAsciiBar(percent, length, type) {
            const filledCount = Math.round(percent * length);
            const emptyCount = length - filledCount;
            if (type === 'progress') {
                if (filledCount === 0) return '[' + '-'.repeat(length) + ']';
                if (filledCount === length) return '[' + '='.repeat(length) + ']';
                return '[' + '='.repeat(filledCount - 1) + '>' + '-'.repeat(emptyCount) + ']';
            } else {
                return '[' + '█'.repeat(filledCount) + '░'.repeat(emptyCount) + ']';
            }
        }

        fetch('bad_apple_data.json')
            .then(response => response.json())
            .then(data => {
                frames = data;
                loadingText.style.display = 'none';
                screen.textContent = ">>> HD SYSTEM READY <<<\nPRESS START BUTTON";
                playBtn.disabled = false;
            })
            .catch(error => console.error("Error loading JSON:", error));

        function renderFrame() {
            let currentFrame = Math.floor(audio.currentTime * fps);
            if (currentFrame < frames.length) {
                screen.textContent = frames[currentFrame];
            } else {
                stopPlaying();
            }
        }

        function startPlaying() {
            isPlaying = true;
            playBtn.textContent = '⏸ PAUSE';
            audio.play();
            intervalId = setInterval(renderFrame, 1000 / fps);
        }

        function stopPlaying() {
            isPlaying = false;
            playBtn.textContent = '▶ PLAY';
            audio.pause();
            clearInterval(intervalId);
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying) stopPlaying();
            else startPlaying();
        });

        neonBtn.addEventListener('click', () => {
            isNeon = !isNeon;
            if (isNeon) {
                document.body.classList.remove('classic-mode');
                neonBtn.textContent = 'NEON: ON';
            } else {
                document.body.classList.add('classic-mode');
                neonBtn.textContent = 'NEON: OFF';
            }
        });

        function updateProgress() {
            if (!audio.duration) return;
            const percent = audio.currentTime / audio.duration;
            asciiProgress.textContent = generateAsciiBar(percent, progressLen, 'progress');
            timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
        }

        audio.addEventListener('timeupdate', updateProgress);

        asciiProgress.addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = asciiProgress.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            audio.currentTime = percent * audio.duration;
            renderFrame();
            updateProgress();
        });

        function updateVolume() {
            asciiVolume.textContent = generateAsciiBar(audio.volume, volumeLen, 'volume');
        }

        asciiVolume.addEventListener('click', (e) => {
            const rect = asciiVolume.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            audio.volume = percent;
            updateVolume();
        });

        updateVolume();

        // 🌟 새로 추가된 이스터 에그 (레인보우 모드) 스크립트 🌟
        let secretCode = "";
        const easterEgg = "rainbow";

        // 사용자가 키보드를 누를 때마다 이 함수가 실행됩니다
        document.addEventListener('keydown', (e) => {
            secretCode += e.key.toLowerCase();
            
            // 너무 길어지면 앞에 입력한 건 지워버립니다
            if (secretCode.length > easterEgg.length) {
                secretCode = secretCode.slice(-easterEgg.length);
            }
            
            // "rainbow"를 정확히 입력했는지 확인!
            if (secretCode === easterEgg) {
                document.body.classList.toggle('rainbow-mode');
                secretCode = ""; // 입력된 글자 초기화 (다시 치면 꺼지도록)
            }
        });

    </script>
</body>
</html>
